services:
  - type: web
    name: ai-job-fit-analyzer-api
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: RATE_LIMIT_PER_MINUTE
        value: 30
      - key: PUBLIC_DEMO_ENABLED
        value: true
      - key: PUBLIC_DEMO_DAILY_LIMIT
        value: 10
      - key: DEMO_MAX_INPUT_CHARS
        value: 12000
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_API_KEY
        sync: false
