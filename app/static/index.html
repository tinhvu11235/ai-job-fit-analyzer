<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CV Fit Analyst Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="CV Fit Analyst Agent">
        <span class="brand-mark">CV</span>
        <span>
          <strong>CV Fit Analyst Agent</strong>
          <small>Phân tích CV theo mô tả công việc</small>
        </span>
      </a>
      <nav class="top-actions" aria-label="Liên kết nhanh">
        <a href="/docs">Tài liệu API</a>
        <a href="/health">Trạng thái</a>
      </nav>
    </header>

    <main class="workspace">
      <section class="input-panel" aria-labelledby="form-title">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Bản dùng thử</p>
            <h1 id="form-title">Phân tích độ phù hợp CV</h1>
          </div>
          <span class="status-chip" id="mode-chip">Demo</span>
        </div>

        <form id="analysis-form" class="analysis-form">
          <div class="field-group">
            <div class="field-heading">
              <label for="cv-text">CV ứng viên</label>
              <label class="file-button" for="cv-file">
                <span aria-hidden="true">↑</span>
                Tải tệp
              </label>
              <input id="cv-file" type="file" accept=".txt,.pdf,.docx" />
            </div>
            <textarea id="cv-text" name="cv_text" required minlength="20" spellcheck="false" placeholder="Dán nội dung CV vào đây"></textarea>
            <p class="field-note" id="file-status"></p>
          </div>

          <div class="field-group">
            <div class="field-heading">
              <label for="jd-text">Mô tả công việc</label>
              <div class="segmented" role="tablist" aria-label="Nguồn mô tả công việc">
                <button type="button" class="segment is-active" data-mode="text">Nội dung</button>
                <button type="button" class="segment" data-mode="url">Liên kết</button>
              </div>
            </div>
            <textarea id="jd-text" name="job_description" required spellcheck="false" placeholder="Dán mô tả công việc vào đây"></textarea>
            <input id="jd-url" class="is-hidden" name="job_url" type="url" placeholder="https://..." />
          </div>

          <div class="grid-two">
            <label class="field">
              <span>Ngôn ngữ kết quả</span>
              <select id="output-language" name="output_language">
                <option value="vi">Tiếng Việt</option>
                <option value="en">English</option>
              </select>
            </label>
            <label class="field">
              <span>Mã truy cập</span>
              <input id="access-code" type="password" autocomplete="off" placeholder="Để trống nếu dùng demo" />
            </label>
          </div>

          <label class="field">
            <span>Ưu tiên cá nhân</span>
            <input id="user-preferences" type="text" placeholder="Remote, mức lương, lĩnh vực, địa điểm..." />
          </label>

          <div class="privacy-line">
            Bản demo không lưu CV/JD vào cơ sở dữ liệu. Kết quả chỉ mang tính tư vấn.
          </div>

          <div class="form-actions">
            <button class="primary-button" id="analyze-button" type="submit">
              <span class="button-icon" aria-hidden="true">→</span>
              <span class="button-label">Phân tích</span>
            </button>
            <button class="ghost-button" id="clear-button" type="button">Xóa nội dung</button>
          </div>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="result-toolbar">
          <div>
            <p class="eyebrow">Kết quả</p>
            <h2 id="result-title">Chưa có phân tích</h2>
          </div>
          <div class="toolbar-actions">
            <button class="icon-button" id="copy-summary" type="button" title="Sao chép tóm tắt" disabled>⧉</button>
            <button class="icon-button" id="download-json" type="button" title="Tải JSON" disabled>↓</button>
          </div>
        </div>

        <div class="empty-state" id="empty-state">
          <div class="empty-score">--</div>
          <p>Nhập CV và mô tả công việc để xem phân tích.</p>
        </div>

        <div class="result-content is-hidden" id="result-content">
          <div class="score-row">
            <div class="score-ring" id="score-ring" style="--score: 0">
              <span id="score-value">0</span>
            </div>
            <div class="score-copy">
              <span class="recommendation" id="recommendation">Maybe</span>
              <h3 id="candidate-summary"></h3>
              <p id="final-advice"></p>
            </div>
          </div>

          <div class="metric-grid" id="score-breakdown"></div>

          <div class="tabs" role="tablist" aria-label="Nhóm kết quả">
            <button class="tab is-active" type="button" data-tab="matches">Phù hợp</button>
            <button class="tab" type="button" data-tab="gaps">Khoảng trống</button>
            <button class="tab" type="button" data-tab="rewrite">Sửa CV</button>
            <button class="tab" type="button" data-tab="interview">Phỏng vấn</button>
          </div>

          <div class="tab-panel" id="matches-panel"></div>
          <div class="tab-panel is-hidden" id="gaps-panel"></div>
          <div class="tab-panel is-hidden" id="rewrite-panel"></div>
          <div class="tab-panel is-hidden" id="interview-panel"></div>
        </div>

        <div class="alert is-hidden" id="alert-box"></div>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
