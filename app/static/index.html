<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Job Fit Analyzer</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="AI Job Fit Analyzer">
        <span class="brand-mark">JF</span>
        <span>
          <strong>AI Job Fit Analyzer</strong>
          <small>CV x Job Description</small>
        </span>
      </a>
      <nav class="top-actions" aria-label="Lien ket nhanh">
        <a href="/docs">API Docs</a>
        <a href="/health">Health</a>
      </nav>
    </header>

    <main class="workspace">
      <section class="input-panel" aria-labelledby="form-title">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Public beta</p>
            <h1 id="form-title">Phan tich do phu hop CV</h1>
          </div>
          <span class="status-chip" id="mode-chip">Demo</span>
        </div>

        <form id="analysis-form" class="analysis-form">
          <div class="field-group">
            <div class="field-heading">
              <label for="cv-text">CV</label>
              <label class="file-button" for="cv-file">Tai tep</label>
              <input id="cv-file" type="file" accept=".txt,.pdf,.docx" />
            </div>
            <textarea id="cv-text" name="cv_text" required minlength="20" spellcheck="false" placeholder="Dan noi dung CV vao day"></textarea>
            <p class="field-note" id="file-status"></p>
          </div>

          <div class="field-group">
            <div class="field-heading">
              <label for="jd-text">Job Description</label>
              <div class="segmented" role="tablist" aria-label="Nguon JD">
                <button type="button" class="segment is-active" data-mode="text">Text</button>
                <button type="button" class="segment" data-mode="url">URL</button>
              </div>
            </div>
            <textarea id="jd-text" name="job_description" required spellcheck="false" placeholder="Dan JD vao day"></textarea>
            <input id="jd-url" class="is-hidden" name="job_url" type="url" placeholder="https://..." />
          </div>

          <div class="grid-two">
            <label class="field">
              <span>Ngon ngu ket qua</span>
              <select id="output-language" name="output_language">
                <option value="vi">Tieng Viet</option>
                <option value="en">English</option>
              </select>
            </label>
            <label class="field">
              <span>Access code</span>
              <input id="access-code" type="password" autocomplete="off" placeholder="De trong neu dung demo" />
            </label>
          </div>

          <label class="field">
            <span>Uu tien ca nhan</span>
            <input id="user-preferences" type="text" placeholder="Remote, salary, domain, location..." />
          </label>

          <div class="privacy-line">
            Ban demo khong luu CV/JD vao co so du lieu. Ket qua chi mang tinh tu van.
          </div>

          <div class="form-actions">
            <button class="primary-button" id="analyze-button" type="submit">
              <span class="button-icon" aria-hidden="true">+</span>
              Phan tich
            </button>
            <button class="ghost-button" id="clear-button" type="button">Xoa</button>
          </div>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="result-toolbar">
          <div>
            <p class="eyebrow">Ket qua</p>
            <h2 id="result-title">Chua co phan tich</h2>
          </div>
          <div class="toolbar-actions">
            <button class="icon-button" id="copy-summary" type="button" title="Sao chep tom tat" disabled>C</button>
            <button class="icon-button" id="download-json" type="button" title="Tai JSON" disabled>D</button>
          </div>
        </div>

        <div class="empty-state" id="empty-state">
          <div class="empty-score">--</div>
          <p>Dien CV va JD de bat dau.</p>
        </div>

        <div class="result-content is-hidden" id="result-content">
          <div class="score-row">
            <div class="score-ring" id="score-ring" style="--score: 0">
              <span id="score-value">0</span>
            </div>
            <div class="score-copy">
              <span class="recommendation" id="recommendation">Maybe</span>
              <h3 id="candidate-summary"></h3>
              <p id="final-advice"></p>
            </div>
          </div>

          <div class="metric-grid" id="score-breakdown"></div>

          <div class="tabs" role="tablist" aria-label="Nhom ket qua">
            <button class="tab is-active" type="button" data-tab="matches">Phu hop</button>
            <button class="tab" type="button" data-tab="gaps">Khoang trong</button>
            <button class="tab" type="button" data-tab="rewrite">Sua CV</button>
            <button class="tab" type="button" data-tab="interview">Phong van</button>
          </div>

          <div class="tab-panel" id="matches-panel"></div>
          <div class="tab-panel is-hidden" id="gaps-panel"></div>
          <div class="tab-panel is-hidden" id="rewrite-panel"></div>
          <div class="tab-panel is-hidden" id="interview-panel"></div>
        </div>

        <div class="alert is-hidden" id="alert-box"></div>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
